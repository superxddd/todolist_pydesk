name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest
      - name: Smoke import
        run: python -c "from ai_todo.app.bootstrap import build_application; app = build_application(test_mode=True); print(type(app.repository).__name__)"
